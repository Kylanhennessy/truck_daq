<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rig Telemetry DAQ</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-color: #1e1e1e;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --amb-color: #a0a0a0;
            --delta-color: #8e24aa;
            
            /* New Stage Colors */
            --state-good: #4caf50;
            --state-warn: #ffeb3b;
            --state-alarm: #ff3333;
        }

        body {
            margin: 0;
            padding: 5px 15px;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100dvh;
            box-sizing: border-box;
            justify-content: space-evenly;
        }

        header {
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .heartbeat {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #444;
            transition: background-color 0.1s ease;
        }
        .heartbeat.active {
            background-color: #00ff00;
            box-shadow: 0 0 8px #00ff00;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        button {
            color: white;
            border: none;
            padding: 10px 12px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        #fullscreen-btn { background-color: #555555; }
        #sim-btn { background-color: #f57c00; color: #121212; }
        #connect-btn { background-color: #2e7d32; }
        #connect-btn.connected { background-color: #c62828; }
        
        #download-btn { background-color: #0288d1; }
        #download-btn:disabled { background-color: #444; color: #777; cursor: not-allowed; box-shadow: none; }
        
        #clear-btn { background-color: #8e24aa; }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background-color: var(--card-color);
            border-radius: 12px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            position: relative;
            border: 1px solid #2a2a2a;
        }

        .delta-strip {
            width: 100%;
            max-width: 1000px;
            background-color: var(--card-color);
            border-radius: 12px;
            margin-top: 8px;
            padding: 8px 15px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #2a2a2a;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .delta-label { font-size: 1rem; font-weight: bold; color: var(--text-muted); letter-spacing: 0.5px; }
        .delta-value { font-size: 1.6rem; font-weight: 800; color: var(--delta-color); font-family: monospace; }
        
        .label { font-size: 0.75rem; font-weight: bold; color: var(--text-muted); margin-bottom: 2px; letter-spacing: 0.5px; text-align: center; }
        .gauge-svg { width: 85%; height: auto; max-width: 110px; }
        .bg-track { fill: none; stroke: #2d2d2d; stroke-width: 8; }
        .value-track { fill: none; stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.3s ease, stroke 0.3s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
        
        .digital-value { font-size: 1.4rem; font-weight: 800; margin-top: 2px; font-family: monospace; transition: color 0.3s ease; }
        .unit { font-size: 0.8rem; color: var(--text-muted); font-weight: normal; margin-left: 2px; }
        
        footer {
            margin-top: 15px;
            font-family: monospace;
            color: #555555;
            font-size: 0.8rem;
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <header>
        <div class="title-group">
            <h1>DAQ Telemetry</h1>
            <div id="heartbeat" class="heartbeat"></div>
        </div>
        <div class="btn-group">
            <button id="fullscreen-btn">FULL SCREEN</button>
            <button id="clear-btn">CLEAR</button>
            <button id="download-btn" disabled>SAVE .TXT</button>
            <button id="sim-btn">SIMULATE</button>
            <button id="connect-btn">CONNECT</button>
        </div>
    </header>

    <div class="grid">
        <div class="card" id="card-xover">
            <div class="label">X-OVER COOLANT</div>
            <svg class="gauge-svg" viewBox="0 0 100 100">
                <circle class="bg-track" cx="50" cy="50" r="40"></circle>
                <circle class="value-track" id="dial-xover" cx="50" cy="50" r="40" stroke="var(--state-good)"></circle>
            </svg>
            <div class="digital-value"><span id="val-xover" style="color: var(--state-good);">---</span><span class="unit">°F</span></div>
        </div>

        <div class="card" id="card-amb">
            <div class="label">AMB ENCLOSURE</div>
            <svg class="gauge-svg" viewBox="0 0 100 100">
                <circle class="bg-track" cx="50" cy="50" r="40"></circle>
                <circle class="value-track" id="dial-amb" cx="50" cy="50" r="40" stroke="var(--amb-color)"></circle>
            </svg>
            <div class="digital-value"><span id="val-amb">---</span><span class="unit">°F</span></div>
        </div>

        <div class="card" id="card-oilu">
            <div class="label">OIL-U (UPPER)</div>
            <svg class="gauge-svg" viewBox="0 0 100 100">
                <circle class="bg-track" cx="50" cy="50" r="40"></circle>
                <circle class="value-track" id="dial-oilu" cx="50" cy="50" r="40" stroke="var(--state-good)"></circle>
            </svg>
            <div class="digital-value"><span id="val-oilu" style="color: var(--state-good);">---</span><span class="unit">°F</span></div>
        </div>

        <div class="card" id="card-oill">
            <div class="label">OIL-L (LOWER)</div>
            <svg class="gauge-svg" viewBox="0 0 100 100">
                <circle class="bg-track" cx="50" cy="50" r="40"></circle>
                <circle class="value-track" id="dial-oill" cx="50" cy="50" r="40" stroke="var(--state-good)"></circle>
            </svg>
            <div class="digital-value"><span id="val-oill" style="color: var(--state-good);">---</span><span class="unit">°F</span></div>
        </div>
    </div>

    <div class="delta-strip">
        <div class="delta-label">OIL LOOP DROP (ΔT)</div>
        <div class="delta-value"><span id="val-delta">---</span><span class="unit" style="color:var(--delta-color)">°F</span></div>
    </div>

    <footer>
        <div>Runtime: <span id="val-time">0.0</span>s</div>
        <div>Log Count: <span id="log-count">0</span> rows</div>
    </footer>

    <script>
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const connectBtn = document.getElementById('connect-btn');
        const downloadBtn = document.getElementById('download-btn');
        const clearBtn = document.getElementById('clear-btn');
        const simBtn = document.getElementById('sim-btn');
        const heartbeat = document.getElementById('heartbeat');
        
        let lastOilU = null;
        let lastOilL = null;

        const headerRow = "Time_Sec,X-OVER_Avg,OIL-U_Avg,OIL-L_Avg,AMB_Avg,Event_Trigger";
        let textLogs = [headerRow];

        const savedLogs = localStorage.getItem('daq_text_logs');
        if (savedLogs) {
            textLogs = JSON.parse(savedLogs);
            document.getElementById('log-count').textContent = textLogs.length - 1;
            if (textLogs.length > 1) downloadBtn.disabled = false;
        }

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable fullscreen: ${err.message}`);
                });
                fullscreenBtn.textContent = "EXIT FULL";
            } else {
                document.exitFullscreen();
                fullscreenBtn.textContent = "FULL SCREEN";
            }
        });

        clearBtn.addEventListener('click', () => {
            if(confirm("Erase all saved telemetry data?")) {
                textLogs = [headerRow];
                localStorage.removeItem('daq_text_logs');
                document.getElementById('log-count').textContent = "0";
                downloadBtn.disabled = true;
            }
        });

        const CIRCUMFERENCE = 2 * Math.PI * 40;
        document.querySelectorAll('.value-track').forEach(dial => {
            dial.style.strokeDasharray = CIRCUMFERENCE;
            dial.style.strokeDashoffset = CIRCUMFERENCE;
        });

        const LIMITS = {
            xover: { min: 100, max: 240, warn: 215.0, alarm: 225.0 },
            oilu:  { min: 100, max: 270, warn: 235.0, alarm: 250.0 },
            oill:  { min: 100, max: 270, warn: 235.0, alarm: 250.0 },
            amb:   { min: 50,  max: 180 } 
        };

        // --- SIMULATION LOGIC ---
        let simInterval = null;
        let simTime = 0;
        let simXover = 190, simOilU = 210, simOilL = 205, simAmb = 85;
        let simDirection = 1;

        simBtn.addEventListener('click', () => {
            if (simInterval) {
                clearInterval(simInterval);
                simInterval = null;
                simBtn.textContent = "SIMULATE";
                simBtn.style.backgroundColor = "#f57c00";
                simBtn.style.color = "#121212";
            } else {
                simBtn.textContent = "STOP SIM";
                simBtn.style.backgroundColor = "#c62828";
                simBtn.style.color = "#ffffff";
                
                simInterval = setInterval(() => {
                    simTime += 2.0;
                    
                    simXover += (0.8 * simDirection);
                    simOilU += (1.5 * simDirection);
                    simOilL += (1.2 * simDirection);
                    simAmb += (0.1 * simDirection);
                    
                    if (simOilU > 260 || simOilU < 200) simDirection *= -1;

                    const simLine = `${simTime.toFixed(1)}s X-OVER: ${simXover.toFixed(1)} OIL-U: ${simOilU.toFixed(1)} OIL-L: ${simOilL.toFixed(1)} AMB: ${simAmb.toFixed(1)} SW: 0`;
                    
                    parseAndExtractData(simLine);
                }, 2000); 
            }
        });
        // ------------------------

        // --- CHROME WEB SERIAL API LOGIC ---
        let port;
        let reader;
        let inputDone;
        let inputStream;

        connectBtn.addEventListener('click', async () => {
            if (port) {
                // Disconnect
                try {
                    if (reader) {
                        await reader.cancel();
                    }
                    if (inputDone) {
                        await inputDone.catch(() => {});
                    }
                    await port.close();
                    port = null;
                    connectBtn.textContent = "CONNECT";
                    connectBtn.classList.remove('connected');
                } catch (e) {
                    console.error(e);
                }
                return;
            }

            try {
                // Request port and open it
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 9600 });
                
                connectBtn.textContent = "DISCONNECT";
                connectBtn.classList.add('connected');
                downloadBtn.disabled = false;

                const decoder = new TextDecoderStream();
                inputDone = port.readable.pipeTo(decoder.writable);
                inputStream = decoder.readable;
                reader = inputStream.getReader();

                readLoop();
            } catch (e) {
                console.error("Connection error:", e);
                alert("Connection failed. Make sure the device is plugged in and you have permission.");
            }
        });

        async function readLoop() {
            let buffer = "";
            while (true) {
                try {
                    const { value, done } = await reader.read();
                    if (value) {
                        buffer += value;
                        let lines = buffer.split("\n");
                        buffer = lines.pop(); // Keep the incomplete line in the buffer
                        
                        for (let line of lines) {
                            parseAndExtractData(line.trim());
                        }
                    }
                    if (done) {
                        reader.releaseLock();
                        break;
                    }
                } catch (error) {
                    console.error("Error reading data:", error);
                    break;
                }
            }
        }
        // -----------------------------------

        downloadBtn.addEventListener('click', () => {
            if (textLogs.length <= 1) return;
            const fileContent = textLogs.join("\n");
            const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            const timestamp = new Date().toISOString().slice(0,19).replace(/:/g, "-");
            
            link.setAttribute("href", url);
            link.setAttribute("download", `daq_run_${timestamp}.txt`);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        function parseAndExtractData(line) {
            if (!line.includes("X-OVER:")) return;

            heartbeat.classList.add('active');
            setTimeout(() => { heartbeat.classList.remove('active'); }, 150);

            const tMatch = line.match(/^([\d.]+)s/);
            const xoverMatch = line.match(/X-OVER:\s*([\d.]+)/);
            const oiluMatch = line.match(/OIL-U:\s*([\d.]+)/);
            const oillMatch = line.match(/OIL-L:\s*([\d.]+)/);
            const ambMatch = line.match(/AMB:\s*([\d.]+)/);
            const swMatch = line.match(/SW:\s*(\d+)/);

            if (tMatch) document.getElementById('val-time').textContent = tMatch[1];

            if (xoverMatch) updateGauge('xover', parseFloat(xoverMatch[1]));
            
            if (oiluMatch) {
                lastOilU = parseFloat(oiluMatch[1]);
                updateGauge('oilu', lastOilU);
            }
            
            if (oillMatch) {
                lastOilL = parseFloat(oillMatch[1]);
                updateGauge('oill', lastOilL);
            }
            
            if (ambMatch) updateGauge('amb', parseFloat(ambMatch[1]));

            if (lastOilU !== null && lastOilL !== null) {
                const delta = lastOilU - lastOilL;
                document.getElementById('val-delta').textContent = delta.toFixed(1);
            }

            if (tMatch && xoverMatch && oiluMatch && oillMatch && ambMatch && swMatch) {
                const textRow = `${tMatch[1]},${xoverMatch[1]},${oiluMatch[1]},${oillMatch[1]},${ambMatch[1]},${swMatch[1]}`;
                textLogs.push(textRow);
                localStorage.setItem('daq_text_logs', JSON.stringify(textLogs));
                document.getElementById('log-count').textContent = textLogs.length - 1;
            }
        }

        function updateGauge(key, val) {
            const textElement = document.getElementById(`val-${key}`);
            const dialElement = document.getElementById(`dial-${key}`);
            
            textElement.textContent = val.toFixed(1);
            
            const cfg = LIMITS[key];
            let percent = (val - cfg.min) / (cfg.max - cfg.min);
            percent = Math.max(0, Math.min(1, percent));
            
            const offset = CIRCUMFERENCE - (percent * CIRCUMFERENCE);
            dialElement.style.strokeDashoffset = offset;

            if (key === 'amb') {
                dialElement.style.stroke = "var(--amb-color)";
                textElement.style.color = "var(--text-color)";
            } else {
                let colorVar = "var(--state-good)"; 
                
                if (val >= cfg.alarm) {
                    colorVar = "var(--state-alarm)"; 
                } else if (val >= cfg.warn) {
                    colorVar = "var(--state-warn)";  
                }
                
                dialElement.style.stroke = colorVar;
                textElement.style.color = colorVar;
            }
        }
    </script>
</body>
</html>
